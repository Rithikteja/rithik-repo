version: '3.8'

services:
  # Smart Parking Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartparking-app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:parking_db
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/parking/spots"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # For MySQL (production setup):
    # environment:
    #   - PORT=8080
    #   - SPRING_DATASOURCE_URL=jdbc:mysql://your-mysql-host:3306/parking_db?sslMode=REQUIRED
    #   - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
    #   - SPRING_DATASOURCE_USERNAME=avnadmin
    #   - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
    #   - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
