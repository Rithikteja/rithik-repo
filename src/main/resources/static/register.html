<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Parking - Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="auth-wrap">
    <main class="auth-card">
      <h1>Create account</h1>
      <p>Set up your profile to start booking parking spots.</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose username" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" placeholder="Optional phone number">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
        <div id="message"></div>
      </form>
      <div class="helper">
        Already registered? <a onclick="switchForm()">Sign in</a>
      </div>
    </main>
  </section>

  <script>
    const registerForm = document.getElementById('registerForm');
    const messageDiv = document.getElementById('message');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Collect and trim values
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value.trim();
      
      // Client-side validation
      if (!username) {
        messageDiv.innerHTML = '<div class="message error">Username is required</div>';
        return;
      }
      if (!email) {
        messageDiv.innerHTML = '<div class="message error">Email is required</div>';
        return;
      }
      if (!password) {
        messageDiv.innerHTML = '<div class="message error">Password is required</div>';
        return;
      }
      if (password.length < 4) {
        messageDiv.innerHTML = '<div class="message error">Password must be at least 4 characters</div>';
        return;
      }
      
      const user = {
        username: username,
        email: email,
        phone: phone,
        password: password,
        role: 'USER'
      };

      messageDiv.innerHTML = '<div class="message info">Creating account...</div>';
      
      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user)
        });
        const data = await response.json();
        if (data.success) {
          messageDiv.innerHTML = '<div class="message success">Registration successful! Redirecting to login...</div>';
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          messageDiv.innerHTML = '<div class="message error">' + (data.message || 'Registration failed') + '</div>';
        }
      } catch (error) {
        messageDiv.innerHTML = '<div class="message error">Connection error: ' + error.message + '</div>';
        console.error('Registration error:', error);
      }
    });

    function switchForm() {
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
