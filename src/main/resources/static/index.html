<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Parking</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="auth-wrap">
    <main class="auth-card">
      <h1>Smart Parking</h1>
      <p id="status">Checking session and opening your workspace.</p>
      <button class="btn btn-primary" onclick="window.location.href='login.html'">Open Login</button>
    </main>
  </section>
  <script>
    const userId = sessionStorage.getItem('userId');
    const target = userId ? 'dashboard.html' : 'login.html';
    const status = document.getElementById('status');
    status.textContent = userId
      ? 'Session found. Redirecting to dashboard.'
      : 'No session found. Redirecting to login.';
    setTimeout(() => window.location.replace(target), 300);
  </script>
</body>
</html>
