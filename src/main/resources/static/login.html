<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Parking - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="auth-wrap">
    <main class="auth-card">
      <h1>Welcome back</h1>
      <p>Sign in to manage parking spots and reservations.</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
        <div id="message"></div>
      </form>
      <div class="helper">
        New user? <a onclick="switchForm()">Create an account</a>
      </div>
    </main>
  </section>

  <script>
    // ============================================
    // API Configuration - Update this for deployment
    // ============================================
    // LOCAL: Use http://localhost:8080
    // PRODUCTION: Use https://smartparking-api.onrender.com
    const API_BASE_URL = window.location.hostname === 'localhost' 
      ? 'http://localhost:8080'
      : 'https://smartparking-api.onrender.com';
    
    console.log('API Base URL:', API_BASE_URL);

    const loginForm = document.getElementById('loginForm');
    const messageDiv = document.getElementById('message');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      
      // Client-side validation
      if (!username) {
        messageDiv.innerHTML = '<div class="message error">Username is required</div>';
        return;
      }
      if (!password) {
        messageDiv.innerHTML = '<div class="message error">Password is required</div>';
        return;
      }

      messageDiv.innerHTML = '<div class="message info">Signing in...</div>';
      
      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (data.success && data.user) {
          sessionStorage.setItem('userId', data.user.id);
          sessionStorage.setItem('username', data.user.username);
          messageDiv.innerHTML = '<div class="message success">Login successful! Redirecting...</div>';
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
        } else {
          messageDiv.innerHTML = '<div class="message error">' + (data.message || 'Invalid username or password') + '</div>';
        }
      } catch (error) {
        messageDiv.innerHTML = '<div class="message error">Connection error: ' + error.message + '</div>';
        console.error('Login error:', error);
      }
    });

    function switchForm() {
      window.location.href = 'register.html';
    }
  </script>
</body>
</html>
